apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: incidenthistories.fixora.io
spec:
  group: fixora.io
  names:
    kind: IncidentHistory
    plural: incidenthistories
    singular: incidenthistory
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                incidents:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      root_cause:
                        type: string
                      applied_fix:
                        type: string
