apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "fixora.fullname" . }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fixora.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "fixora.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "fixora.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
