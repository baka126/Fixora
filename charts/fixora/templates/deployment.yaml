apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fixora.fullname" . }}
  labels:
    {{- include "fixora.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fixora.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "fixora.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fixora.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/fixora"]
          env:
            {{- if .Values.slack.token }}
            - name: SLACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fixora.fullname" . }}
                  key: slack-token
            {{- end }}
            {{- if .Values.slack.signingSecret }}
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fixora.fullname" . }}
                  key: slack-signing-secret
            {{- end }}
            - name: SLACK_CHANNEL
              value: {{ .Values.slack.channel | quote }}
            - name: GOOGLE_CHAT_WEBHOOK_URL
              value: {{ .Values.googleChat.webhookUrl | quote }}
            - name: PROMETHEUS_URL
              value: {{ .Values.prometheus.url | quote }}
            - name: ALERTMANAGER_ENABLED
              value: {{ .Values.alertmanager.enabled | quote }}
            - name: ALERTMANAGER_URL
              value: {{ .Values.alertmanager.url | quote }}
            - name: AI_PROVIDER
              value: {{ .Values.ai.provider | quote }}
            - name: AI_MODEL
              value: {{ .Values.ai.model | quote }}
            {{- if .Values.ai.apiKey }}
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fixora.fullname" . }}
                  key: ai-api-key
            {{- end }}
            {{- if .Values.finops.infracostAPIKey }}
            - name: INFRACOST_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fixora.fullname" . }}
                  key: infracost-api-key
            {{- end }}
            {{- if .Values.vcs.github.token }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fixora.fullname" . }}
                  key: github-token
            {{- end }}
            {{- if .Values.vcs.gitlab.token }}
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fixora.fullname" . }}
                  key: gitlab-token
            {{- end }}
            - name: GITLAB_BASE_URL
              value: {{ .Values.vcs.gitlab.baseUrl | quote }}
            - name: WEBHOOK_TOKEN
              value: {{ .Values.webhook.token | quote }}
            - name: WEBHOOK_USER
              value: {{ .Values.webhook.user | quote }}
            {{- if .Values.webhook.password }}
            - name: WEBHOOK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fixora.fullname" . }}
                  key: webhook-password
            {{- end }}
            - name: FIXORA_MODE
              value: {{ .Values.mode | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MODE_APPROVAL_TTL
              value: {{ .Values.modePolicy.approvalTTL | quote }}
            - name: MODE_AUTOFIX_MAX_PR_PER_HOUR
              value: {{ .Values.modePolicy.autoFixMaxPRPerHour | quote }}
            - name: MODE_DRY_RUN_INCLUDE_PATCH
              value: {{ .Values.modePolicy.dryRunIncludePatch | quote }}
            - name: HA_ENABLED
              value: {{ if and .Values.ha.enabled (include "fixora.databaseEnabled" .) }}"true"{{ else }}"false"{{ end }}
            - name: HA_LEASE_NAME
              value: {{ .Values.ha.leaseName | quote }}
            - name: HA_LEASE_DURATION
              value: {{ .Values.ha.leaseDuration | quote }}
            - name: HA_RENEW_DEADLINE
              value: {{ .Values.ha.renewDeadline | quote }}
            - name: HA_RETRY_PERIOD
              value: {{ .Values.ha.retryPeriod | quote }}
            - name: ARGOCD_ENABLED
              value: {{ .Values.features.argocd.enabled | quote }}
            - name: ARGOCD_NAMESPACE
              value: {{ .Values.features.argocd.namespace | quote }}
            - name: ARGOCD_URL
              value: {{ .Values.features.argocd.url | quote }}
            {{- if .Values.features.argocd.token }}
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fixora.fullname" . }}
                  key: argocd-token
            {{- end }}
            - name: PREDICTIVE_ENABLED
              value: {{ if and .Values.features.predictive.enabled (include "fixora.databaseEnabled" .) }}"true"{{ else }}"false"{{ end }}
            {{- if .Values.features.database.host }}
            - name: DB_HOST
              value: {{ .Values.features.database.host | quote }}
            {{- else if .Values.features.database.embedded.enabled }}
            - name: DB_HOST
              value: {{ printf "%s-postgresql" (include "fixora.fullname" .) | quote }}
            {{- end }}
            - name: DB_PORT
              value: {{ .Values.features.database.port | quote }}
            - name: DB_USER
              value: {{ default "fixora" .Values.features.database.user | quote }}
            {{- if .Values.features.database.password }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fixora.fullname" . }}
                  key: db-password
            {{- else if and .Values.features.predictive.enabled .Values.features.database.embedded.enabled }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fixora.fullname" . }}
                  key: db-password
            {{- end }}
            - name: DB_NAME
              value: {{ .Values.features.database.name | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
