apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fixora.fullname" . }}
  labels:
    {{- include "fixora.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.slack.token }}
  slack-token: {{ .Values.slack.token | b64enc | quote }}
  {{- end }}
  {{- if .Values.slack.signingSecret }}
  slack-signing-secret: {{ .Values.slack.signingSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.ai.apiKey }}
  ai-api-key: {{ .Values.ai.apiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.finops.infracostAPIKey }}
  infracost-api-key: {{ .Values.finops.infracostAPIKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.vcs.github.token }}
  github-token: {{ .Values.vcs.github.token | b64enc | quote }}
  {{- end }}
  {{- if .Values.vcs.gitlab.token }}
  gitlab-token: {{ .Values.vcs.gitlab.token | b64enc | quote }}
  {{- end }}
  {{- if .Values.features.database.password }}
  db-password: {{ .Values.features.database.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.features.argocd.token }}
  argocd-token: {{ .Values.features.argocd.token | b64enc | quote }}
  {{- end }}
  {{- if .Values.webhook.password }}
  webhook-password: {{ .Values.webhook.password | b64enc | quote }}
  {{- end }}
