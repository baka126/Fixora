# Default values for fixora.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/baka126/fixora
  pullPolicy: IfNotPresent
  tag: "main"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

slack:
  token: ""
  signingSecret: ""
  channel: ""

googleChat:
  webhookUrl: ""

prometheus:
  url: "http://prometheus-operated.monitoring.svc.cluster.local:9090"

alertmanager:
  url: "http://alertmanager-operated.monitoring.svc.cluster.local:9093"

ai:
  provider: "gemini" # "gemini", "openai", "anthropic"
  model: ""
  apiKey: ""

mode: "auto-fix" # Options: "auto-fix" (auto-PR), "click-to-fix" (manual approval via Slack/Chat), "dry-run" (report only)

webhook:
  token: ""
  user: ""
  password: ""

# Feature Toggles
features:
  argocd:
    enabled: false
    namespace: "argocd"
    url: ""
    token: ""
  predictive:
    enabled: true
  history:
    crdEnabled: true

vcs:
  github:
    token: ""
  gitlab:
    token: ""
    baseUrl: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080