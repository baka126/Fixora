# Default values for fixora.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/baka126/fixora
  pullPolicy: IfNotPresent
  tag: "v0.1.0"

logLevel: "INFO" # DEBUG, INFO, WARN, ERROR

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

slack:
  token: ""
  signingSecret: ""
  channel: ""

googleChat:
  webhookUrl: ""
  appMode: false # Set to true if configured as a full Chat App (enables interactive buttons)

prometheus:
  url: "http://prometheus-operated.monitoring.svc.cluster.local:9090"

alertmanager:
  enabled: true
  url: "http://alertmanager-operated.monitoring.svc.cluster.local:9093"

ai:
  provider: "gemini" # "gemini", "openai", "anthropic"
  model: ""
  apiKey: ""

mode: "auto-fix" # Options: "auto-fix" (auto-PR), "click-to-fix" (manual approval via Slack/Chat), "dry-run" (report only)
modePolicy:
  approvalTTL: "24h"
  autoFixMaxPRPerHour: 20
  dryRunIncludePatch: true
ha:
  enabled: true
  leaseName: "fixora-leader-election"
  leaseDuration: "15s"
  renewDeadline: "10s"
  retryPeriod: "2s"

webhook:
  token: ""
  user: ""
  password: ""

# FinOps Config
finops:
  infracostAPIKey: ""
  revenuePerRequest: 0.0
  latencyThresholdMS: 500.0
  latencyPenaltyPerHour: 0.0

# Feature Toggles (Modular Architecture)
features:
  # Watch K8s Events and Pod status changes (Highly efficient)
  k8sWatcher:
    enabled: true
  
  # Scan for 5xx errors and Latency spikes via Prometheus (Bulk queries)
  performanceScanner:
    enabled: false
    thresholds:
      errorRate: 0.05    # 5% threshold
      latency: 2.0      # 2 second P99 threshold
  
  # Scan for memory leak trajectories via Prometheus
  leakScanner:
    enabled: false
  
  # Pull firing alerts from Alertmanager API
  alertmanagerScraper:
    enabled: false
    # Optional label filters to reduce noise
    includeLabels: {}
      # fixora: "true"
      # severity: "critical"
    excludeLabels: {}
      # alertname: "Watchdog"

  # ArgoCD integration for repo discovery
  argocd:
    enabled: false
    namespace: "argocd"
    url: ""
    token: ""

  # Predictive analysis & historical state
  predictive:
    enabled: true
    growthThreshold: 0.20
    scanInterval: 5m
    minDataPoints: 10

  # Dedicated database for state and history
  database:
    host: ""
    port: "5432"
    user: "fixora"
    password: ""
    name: "fixora"
    embedded:
      enabled: true
      image:
        repository: postgres
        tag: "16-alpine"
        pullPolicy: IfNotPresent
      storage:
        enabled: true
        size: 8Gi
        storageClassName: ""
      resources: {}

# Scoping (Scale-aware)
scoping:
  includedNamespaces: [] # Empty means all namespaces except excluded
  excludedNamespaces: ["kube-system", "monitoring", "fixora"]

# Gateway API support
httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

vcs:
  github:
    token: ""
  gitlab:
    token: ""
    baseUrl: ""
  trustedDomains: ["github.com", "gitlab.com"]

service:
  type: ClusterIP
  port: 80
  targetPort: 8080