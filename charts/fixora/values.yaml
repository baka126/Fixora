# Default values for fixora.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/baka126/fixora
  pullPolicy: IfNotPresent
  tag: "main"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

slack:
  token: ""
  signingSecret: ""
  channel: ""

googleChat:
  webhookUrl: ""

prometheus:
  url: "http://prometheus-operated.monitoring.svc.cluster.local:9090"

alertmanager:
  enabled: true
  url: "http://alertmanager-operated.monitoring.svc.cluster.local:9093"

ai:
  provider: "gemini" # "gemini", "openai", "anthropic"
  model: ""
  apiKey: ""

mode: "auto-fix" # Options: "auto-fix" (auto-PR), "click-to-fix" (manual approval via Slack/Chat), "dry-run" (report only)

webhook:
  token: ""
  user: ""
  password: ""

# FinOps Config
finops:
  infracostAPIKey: ""

# Feature Toggles
features:
  argocd:
    enabled: false
    namespace: "argocd"
    url: ""
    token: ""
  predictive:
    enabled: true
  database:
    host: ""
    port: "5432"
    user: ""
    password: ""
    name: "fixora"

# Gateway API support
httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

vcs:
  # Global VCS tokens. These are used if no namespace-specific secret is found.
  github:
    token: ""
  gitlab:
    token: ""
    baseUrl: ""
  # Multi-tenant / Namespace-specific VCS Support:
  # Fixora can use different tokens for different namespaces.
  # To use this, create a secret named 'fixora-vcs' in the target application namespace:
  # kubectl create secret generic fixora-vcs --from-literal=github-token=YOUR_TOKEN -n target-namespace

service:
  type: ClusterIP
  port: 80
  targetPort: 8080