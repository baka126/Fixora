# Default values for fixora.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: fixora
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

slack:
  token: ""
  channel: ""

prometheus:
  url: "http://prometheus-operated.monitoring.svc.cluster.local:9090"

alertmanager:
  url: "http://alertmanager-operated.monitoring.svc.cluster.local:9093"

ai:
  provider: "gemini" # "gemini", "openai", "anthropic"
  apiKey: ""

mode: "auto-fix"

webhook:
  token: ""
  user: ""
  password: ""

# Feature Toggles
features:
  argocd:
    enabled: false
    namespace: "argocd"
    url: ""
    token: ""
  predictive:
    enabled: true

vcs:
  github:
    token: ""
  gitlab:
    token: ""
    baseUrl: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
